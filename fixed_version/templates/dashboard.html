<!DOCTYPE html>
<html>
<head>
    <title>Vault Dashboard</title>
    <style>
        body { font-family: 'Courier New', monospace; background: #1a1a1a; color: #0f0; padding: 50px; }
        .card { border: 1px solid #0f0; padding: 20px; max-width: 500px; margin: 0 auto; }
        button { background: #0f0; color: #000; border: none; padding: 10px; cursor: pointer; font-weight: bold; }
        pre { background: #000; padding: 10px; border: 1px dashed #0f0; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Welcome, {{ user }}!</h1>
        <p>Status: <strong>Authenticated</strong></p>
        <hr>
        <h3>Your Vault Quick-Access:</h3>
        <p>Your User ID is: <strong>1</strong></p>
        <button onclick="fetchVault()">View My Secret</button>
        <div id="vaultResult"></div>
        <hr>
        <p><a href="/admin" style="color: #0f0;">Access Admin Panel</a> (Restricted)</p>
    </div>

    <script>
        async function fetchVault() {
            // Note: In the IDOR lab, students will change '1' to '2' in the URL/Postman
            const response = await fetch('/api/vault/1');
            const data = await response.json();
            document.getElementById('vaultResult').innerHTML = 
                "<h4>Server Response:</h4><pre>" + JSON.stringify(data, null, 2) + "</pre>";
        }
    </script>
</body>
</html>
